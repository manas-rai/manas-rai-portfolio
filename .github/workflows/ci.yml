# CI checks only — deploys are handled by Cloudflare Pages' Git integration,
# which builds `python -m app.build` and publishes dist/ on every push to main
# (and a preview URL per PR). See README → Deployment.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run python -m app.build
      - name: Check requirements.txt is in sync with uv.lock
        # Cloudflare's build image installs from requirements.txt, so it must
        # track pyproject/uv.lock. Regenerate with the command in its header.
        # The autogenerated header embeds the output path, so compare
        # non-comment lines only.
        run: |
          uv export --no-dev --no-hashes --no-annotate -o /tmp/requirements.txt
          diff <(grep -v '^#' /tmp/requirements.txt) <(grep -v '^#' requirements.txt)
