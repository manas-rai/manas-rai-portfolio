# CI checks on every push/PR, plus the GitHub Pages deploy on main. The same
# push also triggers Cloudflare Pages' own Git-integration build, so the site
# publishes to two hosts independently:
#   - GitHub Pages  -> manas-rai.github.io/manas-rai-portfolio/  (subpath build)
#   - Cloudflare    -> manas-rai-portfolio.pages.dev             (root build)
# When manasrai.is-a.dev DNS flips to GitHub, drop this job's env overrides and
# re-set the Pages cname.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run python -m app.build

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run python -m app.build
        env:
          BASE_PATH: /manas-rai-portfolio
          SITE_URL: https://manas-rai.github.io/manas-rai-portfolio
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
