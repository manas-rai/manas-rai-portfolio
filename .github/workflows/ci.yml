# CI checks on every push/PR, plus the GitHub Pages deploy on main. The same
# push also triggers Cloudflare Pages' own Git-integration build, so the site
# publishes to two hosts, both root builds:
#   - GitHub Pages (primary) -> https://manasrai.is-a.dev
#   - Cloudflare (mirror)    -> https://manas-rai-portfolio.pages.dev
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run python -m app.build

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    # Pages allows one deployment at a time; without this, back-to-back merges
    # race inside actions/deploy-pages and one hangs until its 10-min timeout.
    # Queue them instead (never cancel an in-flight deployment).
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the build-time commit odometer is real
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run python -m app.build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
