# Keeps the Render free-tier service warm by pinging /healthz, mitigating the
# 30-60s cold start on the contact-form path (design §7.1). This is a mitigation,
# not a fix — a redeploy or a delayed run still yields an occasional cold start.
# Set the repo variable RENDER_PING_URL to your service's /healthz URL:
#   Settings → Secrets and variables → Actions → Variables → New repository variable
#   RENDER_PING_URL = https://manas-rai-portfolio.onrender.com/healthz
name: keep-alive

on:
  schedule:
    - cron: "*/10 * * * *" # every ~10 min (GitHub may delay scheduled runs)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          url="${{ vars.RENDER_PING_URL }}"
          if [ -z "$url" ]; then
            echo "RENDER_PING_URL not set — skipping. Add it as a repo variable to enable."
            exit 0
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$url")
          echo "Pinged $url -> HTTP $code"
          test "$code" = "200"
