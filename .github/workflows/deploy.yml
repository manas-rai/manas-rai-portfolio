# Auto-deploy to AWS on push to main: sam build + sam deploy. Restores the
# "push to publish" flow — edit content, commit, push, and it goes live.
#
# One-time setup (see README → Deployment → Automated deploys):
#   - An IAM role assumable via GitHub OIDC, ARN in secret AWS_DEPLOY_ROLE_ARN.
#   - Optional email secrets (RESEND_API_KEY / SMTP_*) so deploys preserve them.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys against the same stack at once.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write # request the OIDC token for role assumption
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest # x86_64 — builds the x86_64 Lambda image natively
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build
        run: sam build

      - name: Deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "ResendApiKey=${{ secrets.RESEND_API_KEY }}" \
              "SmtpHost=${{ secrets.SMTP_HOST }}" \
              "SmtpUser=${{ secrets.SMTP_USER }}" \
              "SmtpPassword=${{ secrets.SMTP_PASSWORD }}"
