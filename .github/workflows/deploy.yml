# Auto-deploy to AWS on push to main: sam build + sam deploy. Restores the
# "push to publish" flow — edit content, commit, push, and it goes live.
#
# One-time setup (see README → Deployment → Automated deploys):
#   - An IAM user's access key in secrets AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY.
#   - Optional email secrets (RESEND_API_KEY / SMTP_*) so deploys preserve them.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys against the same stack at once.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest # x86_64 — builds the x86_64 Lambda image natively
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build
        run: sam build

      - name: Deploy
        # Only pass email parameter-overrides that are actually set — SAM rejects
        # empty "Key=" values. Secrets come in via env (avoids inlining them in
        # the script) and only non-empty ones are appended.
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          # Preserve any WAF WebACL already attached to the distribution (e.g. the
          # free CloudFront security protections). Without this, CloudFormation
          # tries to remove it, which AWS blocks. Safe on first deploy: the stack
          # doesn't exist yet, so the lookup yields nothing.
          web_acl=""
          dist=$(aws cloudformation describe-stack-resources \
            --stack-name manas-rai-portfolio --logical-resource-id Distribution \
            --query 'StackResources[0].PhysicalResourceId' --output text 2>/dev/null || true)
          if [ -n "$dist" ] && [ "$dist" != "None" ]; then
            web_acl=$(aws cloudfront get-distribution --id "$dist" \
              --query 'Distribution.DistributionConfig.WebACLId' --output text 2>/dev/null || true)
          fi
          [ "$web_acl" = "None" ] && web_acl=""

          overrides=()
          [ -n "$web_acl" ] && overrides+=("WebAclArn=$web_acl")
          [ -n "$RESEND_API_KEY" ] && overrides+=("ResendApiKey=$RESEND_API_KEY")
          [ -n "$SMTP_HOST" ] && overrides+=("SmtpHost=$SMTP_HOST")
          [ -n "$SMTP_USER" ] && overrides+=("SmtpUser=$SMTP_USER")
          [ -n "$SMTP_PASSWORD" ] && overrides+=("SmtpPassword=$SMTP_PASSWORD")

          args=(--resolve-s3 --no-confirm-changeset --no-fail-on-empty-changeset)
          if [ ${#overrides[@]} -gt 0 ]; then
            args+=(--parameter-overrides "${overrides[@]}")
          fi
          sam deploy "${args[@]}"
