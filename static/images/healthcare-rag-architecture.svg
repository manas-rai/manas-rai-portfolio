<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" role="img"
     aria-label="Multi-tenant healthcare RAG platform: requests from multiple tenants pass through an auth and tenant-routing layer into a RAG service. The RAG service retrieves from a per-tenant isolated vector store and calls Azure OpenAI, returning a grounded answer. The platform was load-tested for 2,000+ concurrent sessions at sub-second latency with tenant-isolated data.">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b6b8a"/>
    </marker>
    <style>
      .bg   { fill: #0f0f18; stroke: #26263a; stroke-width: 1.5; }
      .node { fill: #1a1a29; stroke: #33334d; stroke-width: 1.5; }
      .agent{ fill: #171727; stroke: url(#accent); stroke-width: 2; }
      .iso  { fill: #171727; stroke: url(#accent); stroke-width: 2; stroke-dasharray: 6 4; }
      .lbl  { fill: #ecedf3; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 600; }
      .sub  { fill: #a0a1b5; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; }
      .tag  { fill: #22d3ee; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; letter-spacing: 0.12em; }
      .edge { fill: #8a8aa8; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
      .flow { stroke: #6b6b8a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .band { fill: #a0a1b5; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; }
      .tenant { fill: #12121d; stroke: #33334d; stroke-width: 1.25; }
      .tlbl { fill: #c7c8da; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; }
    </style>
  </defs>

  <rect class="bg" x="1" y="1" width="1038" height="518" rx="18"/>
  <text class="tag" x="34" y="44">MULTI-TENANT RAG PIPELINE</text>

  <!-- tenants -->
  <rect class="tenant" x="30" y="110" width="150" height="34" rx="8"/>
  <text class="tlbl" x="105" y="132" text-anchor="middle">Tenant A</text>
  <rect class="tenant" x="30" y="152" width="150" height="34" rx="8"/>
  <text class="tlbl" x="105" y="174" text-anchor="middle">Tenant B</text>
  <rect class="tenant" x="30" y="194" width="150" height="34" rx="8"/>
  <text class="tlbl" x="105" y="216" text-anchor="middle">Tenant C</text>

  <!-- auth -->
  <rect class="node" x="250" y="130" width="170" height="80" rx="12"/>
  <text class="lbl" x="335" y="164" text-anchor="middle">Auth + routing</text>
  <text class="sub" x="335" y="187" text-anchor="middle">tenant identity</text>

  <!-- rag service -->
  <rect class="agent" x="490" y="130" width="180" height="80" rx="12"/>
  <text class="lbl" x="580" y="164" text-anchor="middle">RAG service</text>
  <text class="sub" x="580" y="187" text-anchor="middle">retrieve → ground → answer</text>

  <!-- vector store (isolated) -->
  <rect class="iso" x="760" y="60" width="250" height="76" rx="12"/>
  <text class="lbl" x="885" y="92" text-anchor="middle">Vector store</text>
  <text class="sub" x="885" y="115" text-anchor="middle">isolated per tenant</text>

  <!-- LLM -->
  <rect class="node" x="760" y="204" width="250" height="76" rx="12"/>
  <text class="lbl" x="885" y="236" text-anchor="middle">Azure OpenAI</text>
  <text class="sub" x="885" y="259" text-anchor="middle">generation</text>

  <!-- answer -->
  <rect class="node" x="490" y="330" width="180" height="72" rx="12"/>
  <text class="lbl" x="580" y="362" text-anchor="middle">Grounded answer</text>
  <text class="sub" x="580" y="384" text-anchor="middle">with citations</text>

  <!-- flows -->
  <path class="flow" d="M182 170 C 210 170, 220 170, 246 170"/>
  <path class="flow" d="M182 205 C 215 205, 220 172, 246 172"/>
  <path class="flow" d="M182 210 C 215 210, 220 175, 246 175"/>
  <path class="flow" d="M420 170 L486 170"/>
  <path class="flow" d="M672 158 C 720 150, 725 108, 756 100"/>
  <text class="edge" x="712" y="128" text-anchor="middle">retrieve</text>
  <path class="flow" d="M672 182 C 720 200, 725 235, 756 242"/>
  <text class="edge" x="712" y="222" text-anchor="middle">prompt</text>
  <path class="flow" d="M580 212 L580 326"/>

  <!-- foundation band -->
  <text class="band" x="34" y="470">Load-tested: 2,000+ concurrent sessions</text>
  <text class="band" x="470" y="470">·  sub-second latency</text>
  <text class="band" x="700" y="470">·  tenant-isolated data &amp; auth</text>
</svg>
