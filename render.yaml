# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo as a Blueprint in the Render dashboard; Render reads this
# file to provision the service. Secrets (sync: false) are set in the dashboard,
# never committed.
services:
  - type: web
    name: manas-rai-portfolio
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free # spins down when idle; see design §7.1 and the keep-alive workflow
    region: oregon
    branch: main
    autoDeploy: true # redeploy on every push to main
    healthCheckPath: /healthz
    envVars:
      - key: IS_PRODUCTION
        value: "true"
      - key: EMAIL_FROM
        value: portfolio@manasrai.dev
      - key: EMAIL_TO
        value: rai.manas12@gmail.com
      # Email transport — set ONE of the following in the dashboard to enable
      # contact-form delivery. Until then the form fails gracefully (design §6.1).
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
