AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Manas Rai portfolio — FastAPI on Lambda (container image, x86_64) behind a
  CloudFront distribution. The Function URL uses IAM auth and is reachable only
  through CloudFront via Origin Access Control, so the raw *.lambda-url host
  cannot be hit directly.

Parameters:
  IsProduction:
    Type: String
    Default: "true"
    Description: Hides draft posts and disables reload when "true".
  ResendApiKey:
    Type: String
    Default: ""
    NoEcho: true
  SmtpHost:
    Type: String
    Default: ""
  SmtpPort:
    Type: String
    Default: "587"
  SmtpUser:
    Type: String
    Default: ""
  SmtpPassword:
    Type: String
    Default: ""
    NoEcho: true
  EmailFrom:
    Type: String
    Default: portfolio@manasrai.dev
  EmailTo:
    Type: String
    Default: rai.manas12@gmail.com

Globals:
  Function:
    Timeout: 30
    MemorySize: 512

Resources:
  PortfolioFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      Environment:
        Variables:
          IS_PRODUCTION: !Ref IsProduction
          RESEND_API_KEY: !Ref ResendApiKey
          SMTP_HOST: !Ref SmtpHost
          SMTP_PORT: !Ref SmtpPort
          SMTP_USER: !Ref SmtpUser
          SMTP_PASSWORD: !Ref SmtpPassword
          EMAIL_FROM: !Ref EmailFrom
          EMAIL_TO: !Ref EmailTo
    Metadata:
      DockerContext: .
      Dockerfile: Dockerfile.lambda
      DockerTag: latest

  # Public Function URL — CloudFront proxies to it directly. (The OAC + IAM-auth
  # setup was configured exactly to AWS's spec but signed requests were still
  # rejected with 403; a public origin is the reliable choice for public content.)
  PortfolioFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref PortfolioFunction
      AuthType: NONE

  # Forwards query strings (needed for ?tech / ?tag / ?page) and the app's headers.
  LambdaOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub "${AWS::StackName}-lambda-orp"
        HeadersConfig:
          HeaderBehavior: whitelist
          Headers:
            - Content-Type
            - Accept
            - Accept-Language
            - User-Agent
            - Referer
        CookiesConfig:
          CookieBehavior: none
        QueryStringsConfig:
          QueryStringBehavior: all

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} portfolio"
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: lambda-origin
            # Function URL host, extracted from the full https://.../ URL.
            DomainName: !Select [2, !Split ["/", !GetAtt PortfolioFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: lambda-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          # Managed CachingDisabled — dynamic pages are never cached.
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: !Ref LambdaOriginRequestPolicy
        CacheBehaviors:
          - PathPattern: /static/*
            TargetOriginId: lambda-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            # Managed CachingOptimized — static assets cached at the edge.
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            OriginRequestPolicyId: !Ref LambdaOriginRequestPolicy

  # Required for a public (AuthType NONE) Function URL to be invokable.
  PublicInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PortfolioFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

Outputs:
  CloudFrontURL:
    Description: Public site URL (serve this to visitors).
    Value: !Sub "https://${Distribution.DomainName}"
  FunctionUrl:
    Description: Raw Function URL (public; serve visitors the CloudFront URL instead).
    Value: !GetAtt PortfolioFunctionUrl.FunctionUrl
