- title: RegLens
  summary: >
    Multi-agent regulatory compliance automation. Feed it a regulatory PDF and
    your control matrix — a compliance research agent extracts every obligation,
    a gap analyzer checks each against your policies via RAG and scores the
    risk, and a report generator produces an audit report with a
    human-in-the-loop approval gate. Includes a drift-detection evaluation
    harness.
  tech: [Python, LangGraph, Google ADK, RAGAS, pgvector]
  github: https://github.com/manas-rai/reglens
  demo: https://manas-rai.github.io/reglens/
  featured: true

- title: CostTracker
  summary: >
    Open-source, self-hosted LLM cost tracking SDK. A drop-in instrumentation
    layer wraps OpenAI, Anthropic, Groq, and Bedrock clients to record usage
    straight to ClickHouse or PostgreSQL — real-time token metering,
    per-request cost attribution, and a bundled analytics dashboard.
  tech: [Python, ClickHouse, PostgreSQL]
  github: https://github.com/manas-rai/costtracker
  featured: false

- title: Cloud Waste Hunter
  summary: >
    Cloud-agnostic resource monitor with ML-powered waste detection. Flags idle
