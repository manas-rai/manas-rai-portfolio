    unified cost-optimization dashboard — then eliminates them safely with
    dry-run previews, human-in-the-loop approval, and 7-day rollback.
  tech: [Python, FastAPI, scikit-learn, Next.js]
  github: https://github.com/manas-rai/cloud-waste-hunter
  featured: false
