<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site_tagline }}{% endblock %}" />
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('home') }}">{{ site_name }}</a>
    <nav class="site-nav">
      <a href="{{ url_for('projects') }}">Projects</a>
      <a href="{{ url_for('blog_list') }}">Blog</a>
      <a href="{{ url_for('resume') }}">Resume</a>
      <a href="{{ url_for('contact_form') }}">Contact</a>
    </nav>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ site_name }} — <a href="mailto:{{ contact_email }}">{{ contact_email }}</a></p>
  </footer>
</body>
</html>
